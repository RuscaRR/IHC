<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - QUAL A BOA</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        .evento-detalhe-container { background-color: #fffffe; border-radius: 10px; border: 2px solid var(--orange); padding: 30px; margin-top: 20px; }
        .evento-detalhe-img { width: 100%; height: 400px; object-fit: cover; border-radius: 5px; margin-bottom: 20px; background-color: #333; }
        .evento-infos h2 { color: var(--red); font-size: 2rem; margin-bottom: 10px; }
        .evento-infos p { font-size: 1.1rem; margin-bottom: 15px; color: var(--dark-grey); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html"><img src="../IMG/LogoQualABoa.png" alt="logo" width="200px"></a>
        <ul class="nav-links">
            <li><a href="../index.html">Feed</a></li>
            <li><a href="calendario.html">Calendário</a></li>
        </ul>
    </nav>

    <div class="container">
        <button class="btn-outline" onclick="window.location.href='../index.html'" style="margin-bottom: 20px;">⬅ Voltar ao Feed</button>
        <div class="evento-detalhe-container">
            <img id="detalhe-img" src="" class="evento-detalhe-img">
            <div class="evento-infos">
                <h2 id="detalhe-nome"></h2>
                <p id="detalhe-data-local"></p>
                <hr style="border: 1px solid #eee; margin: 20px 0;">
                <p><strong>Descrição:</strong></p>
                <p id="detalhe-desc"></p>
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button class="btn-orange">Confirmar Presença</button>
                    <button class="btn-outline">⭐ Salvar Evento</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dados = JSON.parse(localStorage.getItem('eventoVisualizar'));
            if (dados) {
                document.getElementById('detalhe-nome').innerText = dados.nome;
                document.getElementById('detalhe-img').src = dados.imagem;
                const dataFormatada = dados.data.split('-').reverse().join('/');
                document.getElementById('detalhe-data-local').innerHTML = `<strong>📅 Data:</strong> ${dataFormatada} | <strong>📍 Local:</strong> ${dados.local}`;
                document.getElementById('detalhe-desc').innerText = dados.desc;
            }
        });
    </script>
</body>
</html>
