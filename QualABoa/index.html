<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - QUAL A BOA</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>

    <nav class="navbar">
        <h1 class="logo"><a href="index.html">QUAL A BOA</a></h1>
        <ul class="nav-links">
            <li><a href="index.html">Feed</a></li>
            <li><a href="./HTML/calendario.html">Calendário</a></li>
            <li><a href="./HTML/perfil.html">Perfil</a></li>
            <li><button class="btn-blue" onclick="tentarCriarEvento()">Criar Evento</button></li>
            <li><button class="btn-outline" style="color: #E53935; border: none;" onclick="fazerLogout()">Sair</button></li>
        </ul>
    </nav>

    <div class="container">
        <div class="feed-header">
            <input type="text" placeholder="Pesquisar eventos..." class="search-bar">
            <div class="filters">
                <button class="btn-blue">Populares</button>
                <button class="btn-blue">Perto de Mim</button>
            </div>
        </div>
        
        <h2 class="section-title">Eventos em Alta</h2>
        <div class="event-grid">
            <div class="event-card">
                <div class="event-img"><img src="./IMG/Mario.jpeg" alt="Mario"></div>
                <div class="event-info">
                    <h3>Competição de sósias do Mario</h3>
                    <p class="event-desc">Hoje, 22:00 - Centro de Eventos</p>
                    <button class="btn-orange" onclick="window.location.href='./HTML/evento.html'">Ver Detalhes</button>
                    <button class="btn-outline" onclick="favoritarEvento('Competição de sósias do Mario', '2026-05-15')">⭐ Salvar</button>
                </div>
            </div>
            <div class="event-card">
                <div class="event-img"><img src="./IMG/Maveco.jpeg" alt="Maveco"></div>
                <div class="event-info">
                    <h3>Encontro de carros antigos</h3>
                    <p class="event-desc">12/5, 22:00 - Shopping lupo</p>
                    <button class="btn-orange" onclick="window.location.href='./HTML/evento.html'">Ver Detalhes</button>
                    <button class="btn-outline" onclick="favoritarEvento('Encontro de carros antigos', '2026-05-12')">⭐ Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="create-event-modal" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="fecharModal('create-event-modal')">&times;</span>
        <h2>Criar Novo Evento</h2>
        
        <label style="color: #fff; font-size: 0.9rem;">Foto do Evento:</label>
        <input type="file" id="novo-evento-img" accept="image/*">
        
        <input type="text" id="novo-evento-nome" placeholder="Nome do Evento">
        <input type="date" id="novo-evento-data">
        <input type="text" id="novo-evento-local" placeholder="Local">
        <textarea id="novo-evento-desc" placeholder="Descrição do evento..."></textarea>
        
        <button class="btn-orange" onclick="publicarEvento()">Publicar Evento</button>
    </div>
</div>

    <script src="./JS/script.js"></script>
</body>
</html>
